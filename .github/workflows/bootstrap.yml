name: Bootstrap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bootstrap:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: dotfiles
