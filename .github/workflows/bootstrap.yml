name: Bootstrap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check packages.tsv is in sync with packages.toml
        run: |
          python3 generate_packages.py > /tmp/packages_generated.tsv
          diff packages.tsv /tmp/packages_generated.tsv

  bootstrap:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: dotfiles

      - name: Move to ~/dotfiles
        run: mv dotfiles ~/dotfiles

      - name: Run bootstrap
        run: sudo -E ~/dotfiles/bootstrap.sh

  bootstrap-amazon-linux:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    # The stock AL2023 container does not include tar, so actions/checkout
    # fails before any install step can run. Bootstrap this job manually.
    steps:
      - name: Install prerequisites
        run: |
          dnf groupinstall -y "Development Tools"
          dnf install -y file git gzip procps-ng sudo shadow-utils tar

      - name: Create bootstrap user
        run: |
          useradd --create-home --home-dir /home/bootstrap bootstrap
          echo 'bootstrap ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/bootstrap
          chmod 440 /etc/sudoers.d/bootstrap

      - name: Clone repository
        run: |
          git clone https://github.com/${{ github.repository }} /home/bootstrap/dotfiles
          chown -R bootstrap:bootstrap /home/bootstrap/dotfiles

      - name: Checkout workflow revision
        run: |
          sudo -Hu bootstrap git -C /home/bootstrap/dotfiles fetch --no-tags origin ${{ github.sha }}
          sudo -Hu bootstrap git -C /home/bootstrap/dotfiles checkout --detach ${{ github.sha }}

      - name: Run bootstrap
        run: |
          su - bootstrap <<'EOF'
          sudo /home/bootstrap/dotfiles/bootstrap.sh
          EOF

  bootstrap-broken-login-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: dotfiles

      - name: Move to ~/dotfiles
        run: mv dotfiles ~/dotfiles

      - name: Inject bash-only syntax into /etc/profile.d (simulates cros-motd.sh)
        run: |
          echo 'broken_array=(one two three)' | sudo tee /etc/profile.d/broken-test.sh
          # Confirm the injection actually breaks sh -lc (regression guard)
          if sudo sh -lc 'echo ok' 2>/dev/null; then
            echo "ERROR: expected sh -lc to fail with broken profile.d" >&2
            exit 1
          fi

      - name: Run bootstrap
        run: sudo -E ~/dotfiles/bootstrap.sh

  bootstrap-curl-pipe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: dotfiles

      - name: Move to ~/dotfiles
        run: mv dotfiles ~/dotfiles

      - name: Run bootstrap via pipe (simulates curl | sudo bash)
        # BASH_SOURCE[0] is empty when bash reads from stdin, so
        # resolve_script_dir falls back to CWD. Run from /tmp to ensure
        # CWD != dotfiles dir - the same failure mode as `curl ... | sudo bash`.
        run: |
          cd /tmp
          sudo bash < ~/dotfiles/bootstrap.sh
